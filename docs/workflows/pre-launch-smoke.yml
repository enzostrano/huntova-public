# Pre-launch smoke gate — Kimi K2.6 round-72 spec.
#
# Stash here because the GitHub Actions OAuth scope on this token can't push
# `.github/workflows/*` paths. To enable: copy this file to
# `.github/workflows/pre-launch-smoke.yml` via the GitHub UI or with a token
# that has the workflow scope.
#
# Trigger model: workflow_dispatch (Enzo runs it manually the morning of
# launch day) + on PRs that touch packaging or the huntova module. This is
# NOT a per-commit gate — it builds the wheel, installs it on a pristine
# runner, and asserts `huntova doctor` exits 0 on each (OS × Python) cell.
#
# A green run on all 9 cells is the launch gate. If any red, hold and fix.

name: Pre-Launch Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - "setup.cfg"
      - "setup.py"
      - "huntova/**"
      - "cli.py"
      - "server.py"
      - "app.py"
      - "db.py"
      - "db_driver.py"
      - "providers.py"
      - "plugins.py"
      - "bundled_plugins.py"

jobs:
  smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Install huntova from wheel
        shell: bash
        run: |
          # Resolve the freshly built wheel cross-platform
          wheel=$(ls dist/huntova-*.whl | head -n 1)
          python -m pip install "$wheel"

      - name: Verify CLI entrypoint
        run: huntova --version

      - name: Install Playwright + Chromium
        run: |
          python -m pip install playwright
          python -m playwright install chromium

      - name: Smoke-init (no real key — accepts a placeholder so doctor can probe)
        shell: bash
        env:
          HV_GEMINI_KEY: "test-key-not-used-for-live-call"
          APP_MODE: "local"
        run: |
          # huntova init is interactive by default; we just need the config dir
          # populated so doctor can read it. Set the key via env and assert
          # `huntova version` succeeds.
          huntova version
          # Touch the config dir so doctor's writability check has something
          # concrete to find.
          python -c "
          from pathlib import Path
          import os
          home = Path.home()
          if os.name == 'nt':
              cfg = home / 'AppData' / 'Roaming' / 'huntova'
          else:
              cfg = home / '.config' / 'huntova'
          cfg.mkdir(parents=True, exist_ok=True)
          (cfg / 'config.json').write_text('{\"mode\":\"local\"}')
          "

      - name: Run doctor (the launch gate)
        env:
          HV_GEMINI_KEY: "test-key-not-used-for-live-call"
          APP_MODE: "local"
          # Skip the live AI probe — `--quick` makes doctor exit 0 on key
          # presence + reachability, without burning a real provider call.
        run: huntova doctor --quick

      - name: Assert SQLite data dir is writable cross-platform
        shell: bash
        run: |
          python -c "
          import sqlite3
          from pathlib import Path
          home = Path.home()
          db_dir = home / '.local' / 'share' / 'huntova'
          # Fall back to the Windows AppData path the CLI uses there
          import os
          if os.name == 'nt':
              db_dir = home / 'AppData' / 'Local' / 'huntova'
          db_dir.mkdir(parents=True, exist_ok=True)
          db = db_dir / 'smoke.db'
          conn = sqlite3.connect(db)
          conn.execute('CREATE TABLE IF NOT EXISTS t (id INTEGER PRIMARY KEY)')
          conn.commit()
          conn.close()
          db.unlink()
          print(f'SQLite OK at {db_dir}')
          "
